<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Santander Institution Email{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .email-container {
            max-width: 600px;
            margin: 20px auto;
            background: #fff;
        }
        .header {
            background-color: #003366;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .logo {
            max-height: 50px;
            margin-bottom: 10px;
        }
        .content {
            padding: 20px;
        }
        .footer {
            background-color: #f0f0f0;
            padding: 15px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }
        .button {
            display: inline-block;
            background-color: #003366;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin: 10px 0;
        }
        @media only screen and (max-width: 600px) {
            .email-container {
                width: 100%;
                margin: 0;
            }
        }
    </style>
</head>
<body>
    <div class="email-container">
        <div class="header">
            <img src="https://www.santanderbank.com/documents/330001/12965577/FA_SANTANDER_COMMERCIAL_BANKING.png/6a38f3da-1e37-cff9-3202-4815e494d45c?t=1695216129054&download=true" alt="Santander" class="logo">
        </div>
        
        <div class="content">
            {% block content %}
            <!-- Content will be inserted here by extending templates -->
            {% endblock %}
        </div>
        
        <div class="footer">
            <p>© 2025 Santander Financial Institution. All rights reserved.</p>

        </div>
    </div>
</body>
</html>
